<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro X | Fixed Edition</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-['Plus_Jakarta_Sans'] bg-slate-100 text-slate-800; }
        }
        @layer components {
            .sidebar-btn {
                @apply flex items-center gap-3 px-6 py-4 rounded-2xl transition-all duration-300 font-black text-xs uppercase tracking-widest text-slate-500 hover:bg-slate-200;
            }
            .sidebar-btn.active { @apply bg-brand-600 text-white shadow-xl shadow-brand-600/30 hover:bg-brand-600; }
            .card-premium { @apply bg-white border border-slate-200 rounded-[2rem] shadow-sm overflow-hidden; }
        }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LucideIcon = ({ name }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className="w-5 h-5 pointer-events-none"></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [products, setProducts] = useState(JSON.parse(localStorage.getItem('products_v3') || '[]'));

            useEffect(() => {
                if (products.length === 0) {
                    setProducts([
                        { id: 1, name: 'MacBook Pro M3', stock: 15, price: 2499 },
                        { id: 2, name: 'iPhone 15 Pro', stock: 4, price: 999 }
                    ]);
                }
            }, []);

            useEffect(() => { localStorage.setItem('products_v3', JSON.stringify(products)); }, [products]);

            return (
                <div className="min-h-screen flex">
                    {/* Sidebar */}
                    <aside className="w-72 bg-white border-r border-slate-200 p-8 flex flex-col gap-10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white"><LucideIcon name="box" /></div>
                            <h1 className="text-xl font-black">Vortex<span className="text-brand-600">Stock</span></h1>
                        </div>
                        <nav className="flex flex-col gap-2">
                            <button onClick={() => setView('dashboard')} className={`sidebar-btn ${view === 'dashboard' ? 'active' : ''}`}>
                                <LucideIcon name="grid" /> <span>Dashboard</span>
                            </button>
                            <button onClick={() => setView('inventory')} className={`sidebar-btn ${view === 'inventory' ? 'active' : ''}`}>
                                <LucideIcon name="list" /> <span>Inventario</span>
                            </button>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-12 bg-slate-50">
                        <header className="mb-10">
                            <h2 className="text-4xl font-black tracking-tighter">{view === 'dashboard' ? 'Resumen Maestro' : 'Control de Stock'}</h2>
                        </header>

                        {view === 'dashboard' ? (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="card-premium p-8 border-l-8 border-brand-600">
                                    <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Total</p>
                                    <h3 className="text-4xl font-black">{products.reduce((a, b) => a + b.stock, 0)}</h3>
                                </div>
                                <div className="card-premium p-8 border-l-8 border-orange-500">
                                    <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Alertas</p>
                                    <h3 className="text-4xl font-black text-orange-600">{products.filter(p => p.stock < 5).length}</h3>
                                </div>
                                <div className="card-premium p-8 border-l-8 border-slate-800">
                                    <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Capital</p>
                                    <h3 className="text-4xl font-black text-brand-700">${products.reduce((a, b) => a + (b.price * b.stock), 0).toLocaleString()}</h3>
                                </div>
                            </div>
                        ) : (
                            <div className="card-premium">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-200">
                                        <tr><th className="px-10 py-6">Producto</th><th className="px-10 py-6">Stock</th><th className="px-10 py-6">Precio</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 font-bold text-slate-700">
                                        {products.map(p => (
                                            <tr key={p.id} className="hover:bg-slate-50/50">
                                                <td className="px-10 py-6 text-lg font-black text-slate-950">{p.name}</td>
                                                <td className="px-10 py-6"><span className={`px-4 py-1.5 rounded-full text-xs font-black ${p.stock < 5 ? 'bg-orange-100 text-orange-600' : 'bg-brand-100 text-brand-600'}`}>{p.stock} uds</span></td>
                                                <td className="px-10 py-6">${p.price.toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
