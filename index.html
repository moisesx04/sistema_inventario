<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro X | Clean Edition</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 
                            50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 
                            500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-['Plus_Jakarta_Sans'] bg-slate-50 text-slate-800 transition-colors duration-500; }
            body.dark { @apply bg-slate-950 text-slate-100; }
        }
        @layer components {
            .card-premium { 
                @apply bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/5 shadow-sm hover:shadow-md transition-all duration-300 rounded-3xl; 
            }
            .sidebar-link {
                @apply flex items-center gap-3 px-5 py-3 rounded-2xl transition-all duration-200 font-bold text-xs uppercase tracking-widest text-slate-500 hover:bg-brand-50 hover:text-brand-600 dark:hover:bg-brand-500/10;
            }
            .sidebar-link.active { @apply bg-brand-600 text-white shadow-lg shadow-brand-600/30; }
            .btn-main { @apply bg-brand-600 hover:bg-brand-700 text-white font-black py-3 px-8 rounded-2xl transition-all active:scale-95 shadow-lg shadow-brand-600/20 flex items-center gap-2; }
        }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [products, setProducts] = useState(JSON.parse(localStorage.getItem('inventory_products') || '[]'));
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [search, setSearch] = useState('');
            const [form, setForm] = useState({ name: '', stock: 0, price: 0, category: 'General' });

            useEffect(() => {
                if (products.length === 0) {
                    setProducts([
                        { id: 1, name: 'Laptop Pro 14', stock: 10, price: 1200, category: 'Equipos' },
                        { id: 2, name: 'Monitor 4K', stock: 5, price: 450, category: 'Equipos' }
                    ]);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('inventory_products', JSON.stringify(products));
            }, [products]);

            const stats = useMemo(() => ({
                total: products.reduce((acc, p) => acc + p.stock, 0),
                value: products.reduce((acc, p) => acc + (p.price * p.stock), 0),
                alerts: products.filter(p => p.stock < 5).length
            }), [products]);

            const filtered = products.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="min-h-screen flex bg-slate-50">
                    {/* Sidebar */}
                    <aside className="w-72 p-6 border-r border-slate-200 bg-white hidden lg:block">
                        <div className="flex items-center gap-3 mb-12 px-2">
                            <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white"><Icon name="box" /></div>
                            <h1 className="text-xl font-black">Vortex<span className="text-brand-600">Stock</span></h1>
                        </div>
                        <nav className="space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`sidebar-link w-full ${activeTab === 'dashboard' ? 'active' : ''}`}><Icon name="grid" /> DASHBOARD</button>
                            <button onClick={() => setActiveTab('inventory')} className={`sidebar-link w-full ${activeTab === 'inventory' ? 'active' : ''}`}><Icon name="list" /> INVENTARIO</button>
                        </nav>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 p-8 lg:p-12">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h2 className="text-4xl font-black tracking-tighter">Mi Almacén</h2>
                                <p className="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1">Versión Limpia & Optimizada</p>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="btn-main"><Icon name="plus" /> AÑADIR</button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                            <div className="card-premium p-8"><p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Existencias</p><h3 className="text-4xl font-black">{stats.total}</h3></div>
                            <div className="card-premium p-8"><p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Alertas</p><h3 className="text-4xl font-black text-orange-500">{stats.alerts}</h3></div>
                            <div className="card-premium p-8"><p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Valor Total</p><h3 className="text-4xl font-black text-brand-600">${stats.value.toLocaleString()}</h3></div>
                        </div>

                        {activeTab === 'inventory' && (
                            <div className="card-premium overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex items-center justify-between">
                                    <h3 className="font-black text-lg">Listado de Productos</h3>
                                    <input type="text" placeholder="Buscar..." className="bg-slate-100 px-4 py-2 rounded-xl outline-none font-bold text-sm" onChange={e => setSearch(e.target.value)} />
                                </div>
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                        <tr><th className="px-8 py-4">Producto</th><th className="px-8 py-4">Stock</th><th className="px-8 py-4">Precio</th><th className="px-8 py-4 text-right">Acciones</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 font-bold">
                                        {filtered.map(p => (
                                            <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-8 py-5 text-lg">{p.name}</td>
                                                <td className="px-8 py-5"><span className={`px-3 py-1 rounded-full text-xs ${p.stock < 5 ? 'bg-orange-100 text-orange-600' : 'bg-brand-100 text-brand-600'}`}>{p.stock} uds</span></td>
                                                <td className="px-8 py-5">${p.price.toLocaleString()}</td>
                                                <td className="px-8 py-5 text-right"><button onClick={() => setProducts(products.filter(item => item.id !== p.id))} className="text-slate-300 hover:text-red-500 transition-colors"><Icon name="trash-2" /></button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/20 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl border border-slate-100">
                                <div className="flex justify-between items-center mb-8"><h2 className="text-2xl font-black">Nuevo Producto</h2><button onClick={() => setIsModalOpen(false)}><Icon name="x" /></button></div>
                                <form className="space-y-4" onSubmit={e => { e.preventDefault(); setProducts([...products, {...form, id: Date.now()}]); setIsModalOpen(false); }}>
                                    <input required className="w-full bg-slate-100 p-4 rounded-2xl outline-none font-bold" placeholder="Nombre" onChange={e => setForm({...form, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="Stock" required className="w-full bg-slate-100 p-4 rounded-2xl font-bold" onChange={e => setForm({...form, stock: parseInt(e.target.value)})} />
                                        <input type="number" placeholder="Precio" required className="w-full bg-slate-100 p-4 rounded-2xl font-bold" onChange={e => setForm({...form, price: parseFloat(e.target.value)})} />
                                    </div>
                                    <button className="w-full btn-main justify-center py-4 text-lg">GUARDAR EN ALMACÉN</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
