<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro X | Grid Edition</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 
                            500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-['Plus_Jakarta_Sans'] bg-slate-100 text-slate-800 transition-colors duration-500; }
        }
        @layer components {
            .card-grid { 
                @apply bg-white border border-slate-300 shadow-sm rounded-3xl overflow-hidden; 
            }
            .sidebar-item {
                @apply flex items-center gap-3 px-5 py-3 rounded-2xl transition-all duration-200 font-bold text-xs uppercase tracking-widest text-slate-500 hover:bg-slate-200 hover:text-brand-600;
            }
            .sidebar-item.active { @apply bg-brand-600 text-white shadow-xl shadow-brand-600/30; }
            .btn-action { @apply bg-brand-600 hover:bg-brand-700 text-white font-black py-3 px-8 rounded-2xl transition-all active:scale-95 shadow-lg shadow-brand-600/20 flex items-center gap-2; }
            
            /* Table Grid System */
            .grid-table { @apply w-full border-collapse bg-white; }
            .grid-table th { @apply px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-50 border border-slate-200; }
            .grid-table td { @apply px-8 py-5 border border-slate-200 font-bold text-slate-700; }
            .grid-table tr:nth-child(even) { @apply bg-slate-50/50; }
            .grid-table tr:hover { @apply bg-brand-50/30; }
        }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [products, setProducts] = useState(JSON.parse(localStorage.getItem('inventory_products') || '[]'));
            const [activeTab, setActiveTab] = useState('inventory');
            const [search, setSearch] = useState('');

            useEffect(() => {
                if (products.length === 0) {
                    setProducts([
                        { id: 1, name: 'MacBook Pro M3', stock: 15, price: 2499 },
                        { id: 2, name: 'iPhone 15 Pro', stock: 8, price: 999 }
                    ]);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('inventory_products', JSON.stringify(products));
            }, [products]);

            const stats = useMemo(() => ({
                total: products.reduce((acc, p) => acc + p.stock, 0),
                value: products.reduce((acc, p) => acc + (p.price * p.stock), 0),
                alerts: products.filter(p => p.stock < 5).length
            }), [products]);

            return (
                <div className="min-h-screen flex">
                    <aside className="w-72 p-8 border-r border-slate-300 bg-white hidden lg:flex flex-col">
                        <div className="flex items-center gap-3 mb-12">
                            <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white"><Icon name="box" /></div>
                            <h1 className="text-xl font-black">Vortex<span className="text-brand-600">Stock</span></h1>
                        </div>
                        <nav className="space-y-4">
                            <button onClick={() => setActiveTab('dashboard')} className={`sidebar-item w-full ${activeTab === 'dashboard' ? 'active' : ''}`}><Icon name="grid" /> DASHBOARD</button>
                            <button onClick={() => setActiveTab('inventory')} className={`sidebar-item w-full ${activeTab === 'inventory' ? 'active' : ''}`}><Icon name="list" /> INVENTARIO</button>
                        </nav>
                    </aside>

                    <main className="flex-1 p-10 bg-slate-100">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h2 className="text-4xl font-black tracking-tighter text-slate-900">Inventario Maestro</h2>
                                <p className="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1 italic">Edición Estructurada con Rejilla</p>
                            </div>
                            <button className="btn-action"><Icon name="plus" /> NUEVO REGISTRO</button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                            <div className="card-grid p-8 border-l-8 border-brand-600 shadow-lg">
                                <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Existencias</p>
                                <h3 className="text-4xl font-black">{stats.total}</h3>
                            </div>
                            <div className="card-grid p-8 border-l-8 border-orange-500 shadow-lg">
                                <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Alertas</p>
                                <h3 className="text-4xl font-black text-orange-500">{stats.alerts}</h3>
                            </div>
                            <div className="card-grid p-8 border-l-8 border-slate-800 shadow-lg">
                                <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Valor</p>
                                <h3 className="text-4xl font-black text-brand-600">${stats.value.toLocaleString()}</h3>
                            </div>
                        </div>

                        <div className="card-grid">
                            <div className="p-8 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                <h3 className="font-black text-xl text-slate-800">Control de Productos</h3>
                                <input type="text" placeholder="Filtrar por nombre..." className="bg-white border border-slate-300 px-6 py-2 rounded-xl outline-none font-bold text-sm w-80 focus:ring-2 ring-brand-500/20" onChange={e => setSearch(e.target.value)} />
                            </div>
                            
                            <table className="grid-table">
                                <thead>
                                    <tr>
                                        <th>Nombre del Producto</th>
                                        <th className="text-center">Stock Disponible</th>
                                        <th>Precio Unitario</th>
                                        <th className="text-right">Operaciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {products.filter(p => p.name.toLowerCase().includes(search.toLowerCase())).map(p => (
                                        <tr key={p.id}>
                                            <td className="text-lg font-black">{p.name}</td>
                                            <td className="text-center">
                                                <span className={`px-4 py-1.5 rounded-full text-xs font-black border-2 ${p.stock < 5 ? 'bg-orange-50 border-orange-200 text-orange-600' : 'bg-brand-50 border-brand-200 text-brand-600'}`}>
                                                    {p.stock} uds
                                                </span>
                                            </td>
                                            <td className="text-xl font-black">${p.price.toLocaleString()}</td>
                                            <td className="text-right">
                                                <button onClick={() => setProducts(products.filter(item => item.id !== p.id))} className="p-3 hover:bg-red-50 text-slate-300 hover:text-red-500 transition-colors rounded-xl">
                                                    <Icon name="trash-2" className="w-5 h-5" />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
