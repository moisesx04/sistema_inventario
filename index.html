<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro X | Vortex Edition</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-['Plus_Jakarta_Sans'] bg-white text-slate-900 dark:bg-brand-950 dark:text-slate-100 transition-colors duration-500; }
        }
        @layer components {
            .glass-panel { @apply bg-white/80 dark:bg-slate-900/40 backdrop-blur-xl border border-slate-200/50 dark:border-white/5 shadow-2xl; }
            .sidebar-item { @apply flex items-center gap-3 px-4 py-3 rounded-2xl transition-all duration-300 text-slate-500 dark:text-slate-400 hover:bg-brand-500/10 hover:text-brand-600 dark:hover:text-brand-400; }
            .sidebar-item.active { @apply bg-brand-600 text-white shadow-xl shadow-brand-600/20; }
            .btn-action { @apply bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 px-6 rounded-2xl transition-all active:scale-95 shadow-lg shadow-brand-600/30 flex items-center gap-2; }
        }
    </style>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center bg-brand-950">
            <div class="text-center">
                <div class="w-16 h-16 border-4 border-brand-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-slate-400 font-bold animate-pulse">Sincronizando Vortex Stock...</p>
            </div>
        </div>
    </div>

    <!-- React Application (Simplified JS for maximum compatibility) -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [products, setProducts] = useState(JSON.parse(localStorage.getItem('inventory_products') || '[]'));
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isDark, setIsDark] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [form, setForm] = useState({ name: '', category: 'Electrónica', stock: 0, price: 0, minStock: 5 });

            useEffect(() => {
                if (products.length === 0) {
                    setProducts([
                        { id: 1, name: 'MacBook Pro M3', category: 'Electrónica', stock: 15, price: 2499, minStock: 5 },
                        { id: 2, name: 'iPhone 15 Pro', category: 'Electrónica', stock: 8, price: 999, minStock: 10 }
                    ]);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('inventory_products', JSON.stringify(products));
                document.body.classList.toggle('dark', isDark);
            }, [products, isDark]);

            const stats = useMemo(() => ({
                total: products.reduce((acc, p) => acc + p.stock, 0),
                lowStock: products.filter(p => p.stock <= p.minStock).length,
                value: products.reduce((acc, p) => acc + (p.price * p.stock), 0)
            }), [products]);

            return (
                <div className="min-h-screen flex bg-slate-50 dark:bg-brand-950">
                    <aside className="fixed inset-y-0 left-0 w-72 p-6 z-50 hidden lg:block">
                        <div className="glass-panel h-full rounded-[2.5rem] p-8 flex flex-col">
                            <div className="flex items-center gap-4 mb-12">
                                <div className="w-12 h-12 bg-brand-600 rounded-2xl flex items-center justify-center text-white"><Icon name="zap" /></div>
                                <h1 className="text-2xl font-black">Vortex<span className="text-brand-500">Stock</span></h1>
                            </div>
                            <nav className="space-y-3 flex-grow">
                                <button onClick={() => setActiveTab('dashboard')} className={`sidebar-item w-full ${activeTab === 'dashboard' ? 'active' : ''}`}><Icon name="layout-grid" /> <span>Dashboard</span></button>
                                <button onClick={() => setActiveTab('inventory')} className={`sidebar-item w-full ${activeTab === 'inventory' ? 'active' : ''}`}><Icon name="database" /> <span>Inventario</span></button>
                            </nav>
                        </div>
                    </aside>
                    <main className="flex-1 lg:ml-72 p-8 lg:p-12">
                        <header className="flex justify-between items-center mb-12">
                            <h2 className="text-4xl font-black">Dashboard</h2>
                            <button onClick={() => setIsModalOpen(true)} className="btn-action"><Icon name="plus" /> NUEVO</button>
                        </header>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div className="glass-panel p-8 rounded-3xl"><p className="text-slate-500 font-bold uppercase text-xs">Total</p><h3 className="text-3xl font-black">{stats.total}</h3></div>
                            <div className="glass-panel p-8 rounded-3xl"><p className="text-slate-500 font-bold uppercase text-xs">Alertas</p><h3 className="text-3xl font-black text-rose-500">{stats.lowStock}</h3></div>
                            <div className="glass-panel p-8 rounded-3xl"><p className="text-slate-500 font-bold uppercase text-xs">Capital</p><h3 className="text-3xl font-black text-emerald-500">${stats.value.toLocaleString()}</h3></div>
                        </div>
                    </main>
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-brand-950/80 backdrop-blur-md">
                            <div className="glass-panel w-full max-w-xl rounded-[3rem] p-10">
                                <h2 className="text-2xl font-black mb-6 text-center">Nuevo Registro</h2>
                                <form className="space-y-4" onSubmit={(e) => { e.preventDefault(); setProducts([...products, {...form, id: Date.now()}]); setIsModalOpen(false); }}>
                                    <input className="w-full bg-white/5 p-4 rounded-2xl outline-none font-bold" placeholder="Nombre" onChange={e => setForm({...form, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="Stock" className="w-full bg-white/5 p-4 rounded-2xl" onChange={e => setForm({...form, stock: parseInt(e.target.value)})} />
                                        <input type="number" placeholder="Precio" className="w-full bg-white/5 p-4 rounded-2xl" onChange={e => setForm({...form, price: parseFloat(e.target.value)})} />
                                    </div>
                                    <button className="w-full btn-action justify-center py-4 text-xl">GUARDAR</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
