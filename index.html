<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro X | Vortex Edition</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#020617',
                        },
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body { 
                @apply font-['Plus_Jakarta_Sans'] bg-white text-slate-900 dark:bg-brand-950 dark:text-slate-100 transition-colors duration-500;
                background-image: radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.05) 0px, transparent 50%),
                                  radial-gradient(at 100% 100%, rgba(251, 113, 133, 0.05) 0px, transparent 50%);
            }
        }
        @layer components {
            .glass-panel { @apply bg-white/80 dark:bg-slate-900/40 backdrop-blur-xl border border-slate-200/50 dark:border-white/5 shadow-2xl; }
            .sidebar-item { @apply flex items-center gap-3 px-4 py-3 rounded-2xl transition-all duration-300 text-slate-500 dark:text-slate-400 hover:bg-brand-500/10 hover:text-brand-600 dark:hover:text-brand-400; }
            .sidebar-item.active { @apply bg-brand-600 text-white shadow-xl shadow-brand-600/20 hover:bg-brand-600 hover:text-white; }
            .stat-card-v2 { @apply relative overflow-hidden glass-panel p-6 rounded-[2rem] group hover:scale-[1.03] transition-all duration-500; }
            .btn-action { @apply bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 px-6 rounded-2xl transition-all active:scale-95 shadow-lg shadow-brand-600/30 flex items-center gap-2; }
        }
    </style>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark">
    <div id="root"></div>

    <!-- React + TypeScript Application (Inlined for reliability on GitHub Pages) -->
    <script type="text/babel" data-presets="react,typescript">
        // --- Types ---
        interface Product {
            id: number; name: string; category: string; stock: number; price: number; minStock: number; image: string;
        }

        const { useState, useEffect, useMemo, useRef } = React;

        // --- Icons Helper ---
        const Icon = ({ name, className = "" }: { name: string; className?: string }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Components ---
        const StatCardX = ({ title, value, icon, color, trend }: { title: string; value: string | number; icon: string; color: string; trend?: string }) => (
            <div className="stat-card-v2">
                <div className="flex justify-between items-start mb-4">
                    <div className={`p-3 rounded-2xl ${color}`}><Icon name={icon} className="w-6 h-6" /></div>
                    {trend && <span className="text-xs font-bold text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded-full">{trend}</span>}
                </div>
                <p className="text-slate-500 dark:text-slate-400 text-sm font-semibold tracking-wide uppercase">{title}</p>
                <h3 className="text-3xl font-extrabold mt-1 text-slate-800 dark:text-white">{value}</h3>
            </div>
        );

        const InventoryChartX = ({ products }: { products: Product[] }) => {
            const canvasRef = useRef<HTMLCanvasElement>(null);
            const chartRef = useRef<any>(null);
            useEffect(() => {
                if (chartRef.current) chartRef.current.destroy();
                const categories = [...new Set(products.map(p => p.category))];
                const data = categories.map(cat => products.filter(p => p.category === cat).reduce((acc, p) => acc + p.stock, 0));
                const ctx = canvasRef.current?.getContext('2d');
                if (ctx) {
                    chartRef.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: categories,
                            datasets: [{ label: 'Stock', data: data, backgroundColor: '#7c3aed', borderRadius: 8, barThickness: 20 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, border: { display: false }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } } }
                    });
                }
            }, [products]);
            return (
                <div className="glass-panel p-8 rounded-[2rem] h-[350px]">
                    <h3 className="text-xl font-bold mb-6">Distribución de Mercancía</h3>
                    <div className="h-[230px]"><canvas ref={canvasRef}></canvas></div>
                </div>
            );
        };

        const App = () => {
            const [products, setProducts] = useState<Product[]>(JSON.parse(localStorage.getItem('inventory_products') || '[]'));
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isDark, setIsDark] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingProduct, setEditingProduct] = useState<Product | null>(null);
            const [form, setForm] = useState<Omit<Product, 'id'>>({ name: '', category: 'Electrónica', stock: 0, price: 0, minStock: 5, image: '' });

            useEffect(() => {
                if (products.length === 0) {
                    const initial = [
                        { id: 1, name: 'MacBook Pro M3', category: 'Electrónica', stock: 15, price: 2499, minStock: 5, image: 'https://ui-avatars.com/api/?name=MB&background=7c3aed&color=fff' },
                        { id: 2, name: 'iPhone 15 Pro', category: 'Electrónica', stock: 8, price: 999, minStock: 10, image: 'https://ui-avatars.com/api/?name=iP&background=7c3aed&color=fff' }
                    ];
                    setProducts(initial);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('inventory_products', JSON.stringify(products));
                document.body.classList.toggle('dark', isDark);
                if (window.lucide) window.lucide.createIcons();
            }, [products, isDark]);

            const stats = useMemo(() => ({
                total: products.reduce((acc, p) => acc + p.stock, 0),
                lowStock: products.filter(p => p.stock <= p.minStock).length,
                value: products.reduce((acc, p) => acc + (p.price * p.stock), 0)
            }), [products]);

            const handleSave = (e: React.FormEvent) => {
                e.preventDefault();
                const pData = { ...form, id: editingProduct?.id || Date.now(), image: form.image || `https://ui-avatars.com/api/?name=${encodeURIComponent(form.name)}&background=7c3aed&color=fff` };
                if (editingProduct) setProducts(products.map(p => p.id === editingProduct.id ? pData : p));
                else setProducts([...products, pData]);
                setIsModalOpen(false);
            };

            return (
                <div className="min-h-screen flex bg-slate-50 dark:bg-brand-950">
                    <aside className="fixed inset-y-0 left-0 w-72 p-6 z-50 hidden lg:block">
                        <div className="glass-panel h-full rounded-[2.5rem] p-8 flex flex-col">
                            <div className="flex items-center gap-4 mb-12">
                                <div className="w-12 h-12 bg-gradient-to-tr from-brand-600 to-brand-400 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-brand-600/30"><Icon name="zap" className="w-7 h-7" /></div>
                                <h1 className="text-2xl font-black tracking-tight">Vortex<span className="text-brand-500">Stock</span></h1>
                            </div>
                            <nav className="space-y-3 flex-grow">
                                {[{ id: 'dashboard', icon: 'layout-grid', label: 'Dashboard' }, { id: 'inventory', icon: 'database', label: 'Inventario' }].map(item => (
                                    <button key={item.id} onClick={() => setActiveTab(item.id)} className={`sidebar-item w-full ${activeTab === item.id ? 'active' : ''}`}>
                                        <Icon name={item.icon} className="w-5 h-5" /><span className="font-bold text-sm uppercase tracking-widest">{item.label}</span>
                                    </button>
                                ))}
                            </nav>
                            <button onClick={() => setIsDark(!isDark)} className="sidebar-item border-2 border-slate-100 dark:border-white/5 mt-auto"><Icon name={isDark ? 'sun' : 'moon'} /><span className="font-bold uppercase tracking-widest">{isDark ? 'Claro' : 'Oscuro'}</span></button>
                        </div>
                    </aside>
                    <main className="flex-1 lg:ml-72 p-8 lg:p-12">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12 text-center md:text-left">
                            <div><h2 className="text-4xl font-black mb-2 tracking-tighter">Inventario Pro X</h2><p className="text-slate-500 font-medium">Gestión de alta precisión para Moises.</p></div>
                            <div className="flex items-center gap-4 justify-center">
                                <button onClick={() => { setEditingProduct(null); setForm({ name: '', category: 'Electrónica', stock: 0, price: 0, minStock: 5, image: '' }); setIsModalOpen(true); }} className="btn-action"><Icon name="plus-circle" /><span>CREAR</span></button>
                            </div>
                        </header>
                        <div className="space-y-10">
                            {activeTab === 'dashboard' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <StatCardX title="Unidades" value={stats.total} icon="box" color="bg-brand-500/10 text-brand-500" trend="+12%" />
                                    <StatCardX title="Alertas" value={stats.lowStock} icon="alert-octagon" color="bg-rose-500/10 text-rose-500" trend="Revisar" />
                                    <StatCardX title="Capital" value={`$${stats.value.toLocaleString()}`} icon="trending-up" color="bg-emerald-500/10 text-emerald-500" trend="+5.4k" />
                                </div>
                            )}
                            {activeTab === 'inventory' && (
                                <div className="glass-panel rounded-[2.5rem] overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50/50 dark:bg-white/5 border-b border-white/5"><tr className="text-[10px] uppercase tracking-[0.2em] font-black text-slate-400"><th className="px-8 py-6">Producto</th><th className="px-8 py-6">Estatus</th><th className="px-8 py-6 text-center">Stock</th><th className="px-8 py-6">Precio</th><th className="px-8 py-6 text-right"></th></tr></thead>
                                        <tbody className="divide-y divide-white/5">
                                            {products.map(p => (
                                                <tr key={p.id} className="hover:bg-brand-500/5 transition-colors">
                                                    <td className="px-8 py-6"><div className="flex items-center gap-4"><img src={p.image} className="w-12 h-12 rounded-2xl shadow-lg" /><div><p className="font-bold text-lg">{p.name}</p><p className="text-xs font-bold text-slate-500 uppercase">{p.category}</p></div></div></td>
                                                    <td className="px-8 py-6"><span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider ${p.stock <= p.minStock ? 'bg-rose-500/10 text-rose-500' : 'bg-emerald-500/10 text-emerald-500'}`}>{p.stock <= p.minStock ? 'ALERTA' : 'SALUDABLE'}</span></td>
                                                    <td className="px-8 py-6 text-center"><span className="font-black text-xl">{p.stock}</span></td>
                                                    <td className="px-8 py-6 font-black text-lg">${p.price.toLocaleString()}</td>
                                                    <td className="px-8 py-6 text-right"><button onClick={() => { setEditingProduct(p); setForm(p); setIsModalOpen(true); }} className="p-3 hover:bg-brand-500/10 rounded-2xl text-brand-500"><Icon name="edit-3" /></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </main>
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-brand-950/80 backdrop-blur-md">
                            <div className="glass-panel w-full max-w-xl rounded-[3rem] p-10">
                                <div className="flex justify-between items-center mb-8"><h2 className="text-3xl font-black">{editingProduct ? 'Editar' : 'Nuevo'} Producto</h2><button onClick={() => setIsModalOpen(false)}><Icon name="x" /></button></div>
                                <form onSubmit={handleSave} className="space-y-6">
                                    <input required className="w-full bg-white/5 border border-white/5 px-6 py-4 rounded-2xl outline-none text-lg font-bold" placeholder="Nombre" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-6">
                                        <input type="number" placeholder="Stock" required className="w-full bg-white/5 px-6 py-4 rounded-2xl outline-none font-bold" value={form.stock} onChange={e => setForm({...form, stock: parseInt(e.target.value)})} />
                                        <input type="number" placeholder="Precio" step="0.01" required className="w-full bg-white/5 px-6 py-4 rounded-2xl outline-none font-bold" value={form.price} onChange={e => setForm({...form, price: parseFloat(e.target.value)})} />
                                    </div>
                                    <button type="submit" className="w-full btn-action justify-center py-5 text-xl uppercase tracking-widest">{editingProduct ? 'Guardar' : 'Crear'}</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = (ReactDOM as any).createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
